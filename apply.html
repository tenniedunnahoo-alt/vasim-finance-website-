<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply - Vasim Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#0f0f0f;color:#fff}

/* HEADER */
header{
display:flex;
align-items:center;
gap:15px;
padding:15px 25px;
background:#111;
}

.back-link{
color:#e7c26a;
font-size:22px;
text-decoration:none;
}

.logo{
display:flex;
align-items:center;
gap:10px;
color:#e7c26a;
font-weight:700;
font-size:18px;
}

.logo img{width:35px}

/* FORM */
.form-section{
max-width:750px;
margin:60px auto;
background:#181818;
padding:40px;
border-radius:14px;
}

h2{text-align:center;color:#e7c26a;margin-bottom:10px;}
.subtitle{text-align:center;color:#aaa;margin-bottom:30px;font-size:14px;}
.form-group{margin-bottom:22px;}

label{display:block;margin-bottom:6px;font-size:14px;color:#ccc;}

input,select{
width:100%;
padding:13px;
border-radius:8px;
border:none;
background:#222;
color:#fff;
outline:none;
font-size:14px;
}

input::placeholder{color:#777;}

input[type=range]{
-webkit-appearance:none;
height:6px;
background:#333;
border-radius:10px;
margin-top:10px;
}

input[type=range]::-webkit-slider-thumb{
-webkit-appearance:none;
width:18px;
height:18px;
border-radius:50%;
background:#e7c26a;
cursor:pointer;
}

.amount-display{
text-align:center;
margin-bottom:10px;
color:#e7c26a;
font-weight:600;
font-size:18px;
}

.hint-box{
background:#161616;
padding:12px 15px;
border-radius:8px;
margin-top:12px;
font-size:12px;
color:#888;
}

.btn{
width:100%;
padding:14px;
background:#e7c26a;
border:none;
border-radius:30px;
font-weight:600;
cursor:pointer;
margin-top:20px;
}

.support-box{
margin-top:30px;
text-align:center;
background:#161616;
padding:20px;
border-radius:12px;
}

.support-btn{
display:inline-block;
margin-top:10px;
padding:10px 22px;
border-radius:30px;
background:#25d366;
color:#fff;
font-weight:600;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<a href="index.html" class="back-link">←</a>
<div class="logo">
<img src="https://i.supaimg.com/1b34b338-d050-498a-9317-227f0cde0ae2/dde757ed-22da-40d7-b50b-c25ec0b24cf3.png">
Vasim Finance
</div>
</header>

<div class="form-section">

<h2>Loan Application Form</h2>
<p class="subtitle">Fill your details and our team will contact you shortly.</p>

<div class="form-group">
<label>Full Name *</label>
<input type="text" id="name" placeholder="Enter your full name properly">
</div>

<div class="form-group">
<label>Mobile Number *</label>
<input type="tel" id="mobile" placeholder="Enter 10 digit mobile number">
</div>

<div class="form-group">
<label>City *</label>
<input type="text" id="city" placeholder="Enter your city name">
</div>

<div class="form-group">
<label>Loan Type</label>
<select id="loanType">
<option>Personal Loan</option>
<option>Business Loan</option>
<option>Home Loan</option>
<option>Loan Against Property</option>
</select>
</div>

<div class="form-group">
<label>Loan Amount</label>
<div class="amount-display" id="amountDisplay">₹1,00,000</div>

<input type="range" min="10000" max="500000" step="1000" value="100000" id="amountSlider">
<input type="number" min="10000" max="500000" step="1000" id="manualAmount" placeholder="Enter amount manually">

<div class="hint-box">
Enter amount between ₹10,000 and ₹5,00,000.
</div>
</div>

<div class="form-group">
<label>Employment Type</label>
<select id="employment">
<option>Salaried</option>
<option>Self Employed</option>
<option>Business Owner</option>
</select>
</div>

<div class="form-group">
<label>Monthly Income</label>
<select id="income">
<option>Below ₹20,000</option>
<option>₹20,000 – ₹50,000</option>
<option>₹50,000 – ₹1,00,000</option>
<option>Above ₹1,00,000</option>
</select>
</div>

<div class="form-group">
<label>Do you have PAN Card?</label>
<select id="pan">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group">
<label>Do you have Aadhaar Card?</label>
<select id="aadhaar">
<option>Yes</option>
<option>No</option>
</select>
</div>

<button class="btn" onclick="submitForm()">Submit Application</button>

<div class="support-box">
<p>Need help filling the form?</p>
<a href="https://wa.me/917073795403" target="_blank" class="support-btn">
Chat on WhatsApp
</a>
</div>

</div>

<script>
const slider=document.getElementById("amountSlider");
const manual=document.getElementById("manualAmount");
const display=document.getElementById("amountDisplay");

function formatAmount(val){
return "₹"+Number(val).toLocaleString("en-IN");
}

display.innerText=formatAmount(slider.value);

slider.addEventListener("input",function(){
display.innerText=formatAmount(this.value);
});

manual.addEventListener("input",function(){
let val=parseInt(this.value);
if(!isNaN(val)){
if(val<10000) val=10000;
if(val>500000) val=500000;
slider.value=val;
display.innerText=formatAmount(val);
}
});

function submitForm(){
let name=document.getElementById("name").value.trim();
let mobile=document.getElementById("mobile").value.trim();
let city=document.getElementById("city").value.trim();
let loan=document.getElementById("loanType").value;
let amount=document.getElementById("amountDisplay").innerText;
let employment=document.getElementById("employment").value;
let income=document.getElementById("income").value;
let pan=document.getElementById("pan").value;
let aadhaar=document.getElementById("aadhaar").value;

if(name==="" || mobile==="" || city===""){
alert("Please fill all required fields.");
return;
}

let message =
"Loan Application:\n\n"+
"Name: "+name+"\n"+
"Mobile: "+mobile+"\n"+
"City: "+city+"\n"+
"Loan Type: "+loan+"\n"+
"Loan Amount: "+amount+"\n"+
"Employment: "+employment+"\n"+
"Monthly Income: "+income+"\n"+
"PAN Available: "+pan+"\n"+
"Aadhaar Available: "+aadhaar;

let whatsappURL = "https://api.whatsapp.com/send?phone=917073795403&text=" + encodeURIComponent(message);

window.open(whatsappURL, "_blank");
}
</script>

</body>
</html>
